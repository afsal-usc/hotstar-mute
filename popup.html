<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 20px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .header svg {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }

    .header .subtitle {
      font-size: 11px;
      color: #888;
      font-weight: 400;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #16213e;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }

    .toggle-row span {
      font-size: 13px;
      font-weight: 500;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle input {
      display: none;
    }

    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 24px;
      transition: background 0.25s;
    }

    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.25s;
    }

    .toggle input:checked + .slider {
      background: #e94560;
    }

    .toggle input:checked + .slider::before {
      transform: translateX(20px);
    }

    .status {
      background: #16213e;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 14px;
    }

    .status-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .status-value {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.watching {
      background: #28a745;
      box-shadow: 0 0 6px rgba(40, 167, 69, 0.6);
    }

    .status-dot.ad {
      background: #dc3545;
      box-shadow: 0 0 6px rgba(220, 53, 69, 0.6);
      animation: pulse 1s infinite;
    }

    .status-dot.disabled {
      background: #666;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .ad-name {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .footer {
      text-align: center;
      font-size: 10px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="#e94560" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="1" y1="1" x2="23" y2="23"/>
      <path d="M16.5 12c0-1.6-.9-3-2.3-3.7L9.7 3.8A8 8 0 0 1 20 12c0 1.4-.4 2.7-1 3.8"/>
      <path d="M5.3 7c-.8 1.5-1.3 3.2-1.3 5 0 4.4 3.6 8 8 8 1.8 0 3.5-.6 5-1.7"/>
      <path d="M11 5l0 7.2"/>
    </svg>
    <div>
      <h1>Hotstar Ad Muter</h1>
      <div class="subtitle">Auto-mute ads during live cricket</div>
    </div>
  </div>

  <div class="toggle-row">
    <span>Auto Mute</span>
    <label class="toggle">
      <input type="checkbox" id="enableToggle" checked>
      <span class="slider"></span>
    </label>
  </div>

  <div class="status">
    <div class="status-label">Status</div>
    <div class="status-value">
      <span class="status-dot watching" id="statusDot"></span>
      <span id="statusText">Watching for ads...</span>
    </div>
    <div class="ad-name" id="adName"></div>
  </div>

  <div class="footer">Works on jiohotstar.com live streams</div>

  <script src="popup.js"></script>
</body>
</html>
